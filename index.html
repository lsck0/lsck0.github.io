<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#955; lsck0</title>

    <!-- Theme initialization (runs immediately to prevent flash) -->
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        if (!theme) {
          theme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          localStorage.setItem("theme", theme);
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- 0xProto font (served via jsDelivr from GitHub) -->
    <style>
      @font-face {
        font-family: "0xProto";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("https://cdn.jsdelivr.net/gh/0xType/0xProto@2.502/fonts/0xProto-Regular.woff2")
          format("woff2");
      }
      @font-face {
        font-family: "0xProto";
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url("https://cdn.jsdelivr.net/gh/0xType/0xProto@2.502/fonts/0xProto-Italic.woff2")
          format("woff2");
      }
      @font-face {
        font-family: "0xProto";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url("https://cdn.jsdelivr.net/gh/0xType/0xProto@2.502/fonts/0xProto-Bold.woff2")
          format("woff2");
      }
    </style>

    <!-- Trunk-managed assets -->
    <link data-trunk rel="scss" href="public/scss/styles.scss" />
    <link data-trunk rel="rust" data-wasm-opt="z" data-weak-refs />
    <link data-trunk rel="copy-dir" href="public/js" />

    <!-- KaTeX -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    ></script>

    <!-- TikZ: intercept window.onload to capture the render function -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://tikzjax.com/v1/fonts.css"
    />
    <script>
      // tikzjax.js sets window.onload = async function() { ... }
      // We intercept that assignment to capture the function and call it on demand.
      var _tikzjaxRender = null;
      Object.defineProperty(window, "onload", {
        set: function (fn) {
          _tikzjaxRender = fn;
        },
        get: function () {
          return _tikzjaxRender;
        },
        configurable: true,
      });
    </script>
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>
    <script>
      // Restore normal onload behavior
      delete window.onload;
    </script>

    <!-- Code highlighting (theme via CSS custom properties) -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-latex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"
    ></script>

    <!-- Mermaid -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"
    ></script>

    <!-- Our JS -->
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/post.js"></script>
  </head>

  <body></body>
</html>
