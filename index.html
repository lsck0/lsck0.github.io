    <!-- our JS -->
    <script defer src="/js/theme.js"></script>
    <script defer src="/js/post.js"></script>

    <!-- theme initialization before loading anything else -->
    <script>
      (function () {
        var theme = localStorage.getItem("theme");

        if (!theme) {
          theme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          localStorage.setItem("theme", theme);
        }

        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- KaTeX -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />

    ></script>

    <!-- TikZ: intercept window.onload to capture the render function -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://tikzjax.com/v1/fonts.css"
    />
    <script>
      // tikzjax.js sets window.onload = async function() { ... }
      // We intercept that assignment to capture the function and call it on demand.
      var _tikzjaxRender = null;
      Object.defineProperty(window, "onload", {
        set: function (fn) {
          _tikzjaxRender = fn;
        },
        get: function () {
          return _tikzjaxRender;
        },
        configurable: true,
      });
    </script>
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>
    <script>
      // restore normal onload behavior
      delete window.onload;
    </script>
